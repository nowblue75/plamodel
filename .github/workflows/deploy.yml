name: Deploy Granzort Archive to GitHub Pages
on:
  push:
      branches: [main]
        workflow_dispatch:
        permissions:
          contents: write
          jobs:
            build-and-deploy:
                runs-on: ubuntu-latest
                    steps:
                          - name: Checkout
                                  uses: actions/checkout@v4
                                        - name: Set up Node.js
                                                uses: actions/setup-node@v4
                                                        with:
                                                                  node-version: 20
                                                                            cache: 'npm'
                                                                                      cache-dependency-path: './granzort/package-lock.json'
                                                                                            - name: Install Dependencies
                                                                                                    working-directory: ./granzort
                                                                                                            run: npm install
                                                                                                                  - name: Build
                                                                                                                          working-directory: ./granzort
                                                                                                                                  run: npm run build
                                                                                                                                        - name: Deploy
                                                                                                                                                uses: peaceiris/actions-gh-pages@v3
                                                                                                                                                        with:
                                                                                                                                                                  github_token: ${{ secrets.GITHUB_TOKEN }}
                                                                                                                                                                            publish_dir: ./granzort/dist
                                                                                                                                                                                      destination_dir: granzort
                                                                                                                                                                                                keep_files: true
                                                                                                                                                                                                
